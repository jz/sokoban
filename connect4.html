<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四子棋 Connect 4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #e0e0e0;
  font-family: 'Arial', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  color: #f39c12;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.back-link {
  color: #3498db;
  text-decoration: none;
  margin-bottom: 20px;
  display: inline-block;
  padding: 8px 16px;
  border: 2px solid #3498db;
  border-radius: 5px;
  transition: all 0.3s;
}

.back-link:hover {
  background: #3498db;
  color: white;
}

#game-info {
  display: flex;
  gap: 30px;
  margin-bottom: 20px;
  font-size: 1.2rem;
}

.player-info {
  background: rgba(255,255,255,0.05);
  padding: 15px 25px;
  border-radius: 10px;
  border: 2px solid transparent;
  transition: all 0.3s;
}

.player-info.active {
  border-color: #f39c12;
  background: rgba(243, 156, 18, 0.1);
  transform: scale(1.05);
}

.player-name {
  font-weight: bold;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player-disc {
  width: 20px;
  height: 20px;
  border-radius: 50%;
}

.player-disc.red { background: #e74c3c; }
.player-disc.yellow { background: #f39c12; }

.player-score {
  font-size: 0.9rem;
  color: #888;
}

#game-container {
  position: relative;
  background: rgba(0,0,0,0.3);
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

#board {
  background: #2980b9;
  border-radius: 10px;
  padding: 10px;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
}

#board canvas {
  display: block;
  cursor: pointer;
}

#controls {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  justify-content: center;
}

button {
  padding: 10px 25px;
  border: none;
  border-radius: 5px;
  background: #3498db;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: bold;
}

button:hover {
  background: #2980b9;
  transform: translateY(-2px);
}

button:active {
  transform: translateY(0);
}

button.danger {
  background: #e74c3c;
}

button.danger:hover {
  background: #c0392b;
}

#instructions {
  margin-top: 30px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 8px;
  max-width: 500px;
  text-align: center;
}

#instructions h3 {
  color: #f39c12;
  margin-bottom: 15px;
}

#instructions ul {
  list-style: none;
  padding: 0;
}

#instructions li {
  margin: 8px 0;
  color: #aaa;
}

.winner-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  animation: fadeIn 0.5s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.winner-content {
  background: #1a1a2e;
  border: 3px solid #f39c12;
  border-radius: 20px;
  padding: 40px 60px;
  text-align: center;
  animation: popIn 0.5s;
}

@keyframes popIn {
  0% { transform: scale(0); }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.winner-content h2 {
  font-size: 3rem;
  margin-bottom: 20px;
}

.winner-content.red h2 { color: #e74c3c; }
.winner-content.yellow h2 { color: #f39c12; }
.winner-content.draw h2 { color: #95a5a6; }

.winner-buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-top: 30px;
}

.column-highlight {
  position: absolute;
  top: 0;
  width: 70px;
  height: 10px;
  background: rgba(255,255,255,0.3);
  border-radius: 5px;
  pointer-events: none;
  transition: left 0.1s;
}

@media (max-width: 600px) {
  h1 {
    font-size: 2rem;
  }
  
  #game-info {
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  
  .player-info {
    padding: 10px 20px;
  }
}
</style>
</head>
<body>
<a href="index.html" class="back-link">← 返回游戏列表</a>

<h1>🔴 四子棋 Connect 4 🟡</h1>

<div id="game-info">
  <div class="player-info active" id="player1">
    <div class="player-name">
      <div class="player-disc red"></div>
      <span>红方</span>
    </div>
    <div class="player-score">胜利: <span id="score1">0</span></div>
  </div>
  
  <div class="player-info" id="player2">
    <div class="player-name">
      <div class="player-disc yellow"></div>
      <span>黄方</span>
    </div>
    <div class="player-score">胜利: <span id="score2">0</span></div>
  </div>
</div>

<div id="game-container">
  <div id="board">
    <canvas id="gameCanvas" width="490" height="420"></canvas>
  </div>
</div>

<div id="controls">
  <button id="restart-btn">🔄 重新开始</button>
  <button id="reset-scores-btn" class="danger">清除分数</button>
</div>

<div id="instructions">
  <h3>🎯 游戏规则</h3>
  <ul>
    <li>轮流点击列来放置棋子</li>
    <li>棋子会自动落到最底部</li>
    <li>先连成4个棋子的玩家获胜（横、竖、斜）</li>
    <li>红方先手</li>
  </ul>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const ROWS = 6;
const COLS = 7;
const CELL_SIZE = 70;
const DISC_RADIUS = 30;

const EMPTY = 0;
const RED = 1;
const YELLOW = 2;

let board = [];
let currentPlayer = RED;
let gameOver = false;
let scores = { red: 0, yellow: 0 };
let winningCells = [];

// Initialize
function init() {
  board = Array(ROWS).fill(null).map(() => Array(COLS).fill(EMPTY));
  currentPlayer = RED;
  gameOver = false;
  winningCells = [];
  updatePlayerInfo();
  render();
}

// Load scores from localStorage
function loadScores() {
  const saved = localStorage.getItem('connect4_scores');
  if (saved) {
    scores = JSON.parse(saved);
    document.getElementById('score1').textContent = scores.red;
    document.getElementById('score2').textContent = scores.yellow;
  }
}

// Save scores
function saveScores() {
  localStorage.setItem('connect4_scores', JSON.stringify(scores));
}

// Update player info display
function updatePlayerInfo() {
  const player1 = document.getElementById('player1');
  const player2 = document.getElementById('player2');
  
  player1.classList.toggle('active', currentPlayer === RED && !gameOver);
  player2.classList.toggle('active', currentPlayer === YELLOW && !gameOver);
}

// Get column from x position
function getColumn(x) {
  return Math.floor(x / CELL_SIZE);
}

// Drop disc into column
function dropDisc(col) {
  if (gameOver) return false;
  
  // Find lowest empty row in column
  for (let row = ROWS - 1; row >= 0; row--) {
    if (board[row][col] === EMPTY) {
      board[row][col] = currentPlayer;
      return { row, col };
    }
  }
  
  return false; // Column is full
}

// Check for win
function checkWin(row, col) {
  const player = board[row][col];
  const directions = [
    [0, 1],   // Horizontal
    [1, 0],   // Vertical
    [1, 1],   // Diagonal \
    [1, -1]   // Diagonal /
  ];
  
  for (const [dr, dc] of directions) {
    const cells = [{row, col}];
    
    // Check in positive direction
    for (let i = 1; i < 4; i++) {
      const r = row + dr * i;
      const c = col + dc * i;
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
        cells.push({row: r, col: c});
      } else {
        break;
      }
    }
    
    // Check in negative direction
    for (let i = 1; i < 4; i++) {
      const r = row - dr * i;
      const c = col - dc * i;
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
        cells.push({row: r, col: c});
      } else {
        break;
      }
    }
    
    if (cells.length >= 4) {
      winningCells = cells;
      return true;
    }
  }
  
  return false;
}

// Check for draw
function checkDraw() {
  return board[0].every(cell => cell !== EMPTY);
}

// Show winner overlay
function showWinner(winner) {
  const overlay = document.createElement('div');
  overlay.className = 'winner-overlay';
  
  const content = document.createElement('div');
  content.className = `winner-content ${winner === RED ? 'red' : winner === YELLOW ? 'yellow' : 'draw'}`;
  
  if (winner === RED) {
    content.innerHTML = `
      <h2>🎉 红方获胜！</h2>
      <div class="winner-buttons">
        <button onclick="restartGame()">🔄 再来一局</button>
        <button onclick="window.location.href='index.html'">🏠 返回主页</button>
      </div>
    `;
  } else if (winner === YELLOW) {
    content.innerHTML = `
      <h2>🎉 黄方获胜！</h2>
      <div class="winner-buttons">
        <button onclick="restartGame()">🔄 再来一局</button>
        <button onclick="window.location.href='index.html'">🏠 返回主页</button>
      </div>
    `;
  } else {
    content.innerHTML = `
      <h2>🤝 平局！</h2>
      <div class="winner-buttons">
        <button onclick="restartGame()">🔄 再来一局</button>
        <button onclick="window.location.href='index.html'">🏠 返回主页</button>
      </div>
    `;
  }
  
  overlay.appendChild(content);
  document.body.appendChild(overlay);
}

// Restart game
function restartGame() {
  const overlay = document.querySelector('.winner-overlay');
  if (overlay) overlay.remove();
  init();
}

// Handle click
canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const col = getColumn(x);
  
  if (col < 0 || col >= COLS) return;
  
  const result = dropDisc(col);
  if (!result) return; // Column full
  
  render();
  
  // Check for win
  if (checkWin(result.row, result.col)) {
    gameOver = true;
    const winner = currentPlayer;
    if (winner === RED) {
      scores.red++;
      document.getElementById('score1').textContent = scores.red;
    } else {
      scores.yellow++;
      document.getElementById('score2').textContent = scores.yellow;
    }
    saveScores();
    render(); // Re-render to show winning cells
    setTimeout(() => showWinner(winner), 500);
    return;
  }
  
  // Check for draw
  if (checkDraw()) {
    gameOver = true;
    setTimeout(() => showWinner(null), 500);
    return;
  }
  
  // Switch player
  currentPlayer = currentPlayer === RED ? YELLOW : RED;
  updatePlayerInfo();
});

// Hover effect
canvas.addEventListener('mousemove', (e) => {
  if (gameOver) {
    canvas.style.cursor = 'default';
    return;
  }
  
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const col = getColumn(x);
  
  if (col >= 0 && col < COLS && board[0][col] === EMPTY) {
    canvas.style.cursor = 'pointer';
  } else {
    canvas.style.cursor = 'not-allowed';
  }
});

// Render board
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw board background
  ctx.fillStyle = '#2980b9';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw cells
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const x = col * CELL_SIZE + CELL_SIZE / 2;
      const y = row * CELL_SIZE + CELL_SIZE / 2;
      
      // Check if this is a winning cell
      const isWinning = winningCells.some(cell => cell.row === row && cell.col === col);
      
      // Draw hole
      ctx.beginPath();
      ctx.arc(x, y, DISC_RADIUS, 0, Math.PI * 2);
      
      if (board[row][col] === EMPTY) {
        ctx.fillStyle = '#1a1a2e';
      } else if (board[row][col] === RED) {
        // Red disc with gradient
        const gradient = ctx.createRadialGradient(x - 5, y - 5, 0, x, y, DISC_RADIUS);
        gradient.addColorStop(0, '#ff6b6b');
        gradient.addColorStop(1, '#e74c3c');
        ctx.fillStyle = gradient;
      } else {
        // Yellow disc with gradient
        const gradient = ctx.createRadialGradient(x - 5, y - 5, 0, x, y, DISC_RADIUS);
        gradient.addColorStop(0, '#ffeaa7');
        gradient.addColorStop(1, '#f39c12');
        ctx.fillStyle = gradient;
      }
      
      ctx.fill();
      
      // Draw highlight for winning cells
      if (isWinning) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        // Glow effect
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      
      // Draw disc shine
      if (board[row][col] !== EMPTY) {
        ctx.beginPath();
        ctx.arc(x - 8, y - 8, 8, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fill();
      }
    }
  }
}

// Button handlers
document.getElementById('restart-btn').addEventListener('click', restartGame);

document.getElementById('reset-scores-btn').addEventListener('click', () => {
  if (confirm('确定要清除所有分数吗？')) {
    scores = { red: 0, yellow: 0 };
    saveScores();
    document.getElementById('score1').textContent = 0;
    document.getElementById('score2').textContent = 0;
  }
});

// Make restartGame available globally
window.restartGame = restartGame;

// Initialize game
loadScores();
init();
</script>
</body>
</html>

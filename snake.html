<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇 Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #e0e0e0;
  font-family: 'Arial', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  color: #2ecc71;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.back-link {
  color: #3498db;
  text-decoration: none;
  margin-bottom: 20px;
  display: inline-block;
  padding: 8px 16px;
  border: 2px solid #3498db;
  border-radius: 5px;
  transition: all 0.3s;
}

.back-link:hover {
  background: #3498db;
  color: white;
}

#game-info {
  display: flex;
  gap: 30px;
  margin-bottom: 20px;
  font-size: 1.2rem;
}

.info-item {
  background: rgba(255,255,255,0.05);
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid rgba(46, 204, 113, 0.3);
}

.info-label {
  color: #888;
  font-size: 0.9rem;
}

.info-value {
  color: #2ecc71;
  font-weight: bold;
  font-size: 1.5rem;
}

#game-container {
  position: relative;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

canvas {
  border: 3px solid #2ecc71;
  border-radius: 5px;
  display: block;
  background: #1a1a1a;
}

#controls {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

button {
  padding: 10px 25px;
  border: none;
  border-radius: 5px;
  background: #2ecc71;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: bold;
}

button:hover {
  background: #27ae60;
  transform: translateY(-2px);
}

button:active {
  transform: translateY(0);
}

button.pause {
  background: #f39c12;
}

button.pause:hover {
  background: #e67e22;
}

#instructions {
  margin-top: 30px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 8px;
  max-width: 500px;
  text-align: center;
}

#instructions h3 {
  color: #2ecc71;
  margin-bottom: 15px;
}

#instructions ul {
  list-style: none;
  padding: 0;
}

#instructions li {
  margin: 8px 0;
  color: #aaa;
}

#mobile-controls {
  display: none;
  margin-top: 20px;
  gap: 5px;
}

#mobile-controls button {
  width: 70px;
  height: 70px;
  font-size: 2rem;
  padding: 0;
  background: #34495e;
}

#mobile-controls button:active {
  background: #2ecc71;
}

@media (max-width: 600px) {
  #mobile-controls {
    display: grid;
    grid-template-columns: repeat(3, 70px);
    grid-template-rows: repeat(2, 70px);
    justify-content: center;
  }
  
  #mobile-controls .up { grid-column: 2; grid-row: 1; }
  #mobile-controls .left { grid-column: 1; grid-row: 2; }
  #mobile-controls .down { grid-column: 2; grid-row: 2; }
  #mobile-controls .right { grid-column: 3; grid-row: 2; }
  
  #game-info {
    flex-direction: column;
    gap: 10px;
  }
}

.game-over-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.game-over-content {
  background: #1a1a2e;
  border: 3px solid #e74c3c;
  border-radius: 15px;
  padding: 40px;
  text-align: center;
  animation: popIn 0.5s;
}

@keyframes popIn {
  0% { transform: scale(0); }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.game-over-content h2 {
  color: #e74c3c;
  font-size: 2.5rem;
  margin-bottom: 20px;
}

.final-score {
  font-size: 3rem;
  color: #2ecc71;
  margin: 20px 0;
}

.game-over-buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-top: 20px;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">← 返回游戏列表</a>

<h1>🐍 贪吃蛇</h1>

<div id="game-info">
  <div class="info-item">
    <div class="info-label">得分</div>
    <div class="info-value" id="score">0</div>
  </div>
  <div class="info-item">
    <div class="info-label">最高分</div>
    <div class="info-value" id="high-score">0</div>
  </div>
  <div class="info-item">
    <div class="info-label">长度</div>
    <div class="info-value" id="length">3</div>
  </div>
</div>

<div id="game-container">
  <canvas id="game" width="400" height="400"></canvas>
</div>

<div id="controls">
  <button id="start-btn">▶️ 开始游戏</button>
  <button id="pause-btn" class="pause" disabled>⏸️ 暂停</button>
</div>

<div id="mobile-controls">
  <button class="up">⬆️</button>
  <button class="left">⬅️</button>
  <button class="down">⬇️</button>
  <button class="right">➡️</button>
</div>

<div id="instructions">
  <h3>🎯 游戏规则</h3>
  <ul>
    <li>使用方向键或WASD控制蛇的移动</li>
    <li>吃掉绿色食物来增加长度和得分</li>
    <li>避免撞墙或咬到自己</li>
    <li>按空格键暂停/继续游戏</li>
  </ul>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID_SIZE = 20;
const GRID_COUNT = canvas.width / GRID_SIZE;

// 游戏状态
let snake = [];
let food = { x: 0, y: 0 };
let direction = { x: 1, y: 0 };
let nextDirection = { x: 1, y: 0 };
let score = 0;
let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
let gameRunning = false;
let gamePaused = false;
let gameLoop = null;
let speed = 150; // 毫秒

// DOM 元素
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('high-score');
const lengthEl = document.getElementById('length');
const startBtn = document.getElementById('start-btn');
const pauseBtn = document.getElementById('pause-btn');

// 初始化
highScoreEl.textContent = highScore;

function initGame() {
  // 初始化蛇（3节）
  snake = [
    { x: 5, y: 10 },
    { x: 4, y: 10 },
    { x: 3, y: 10 }
  ];
  
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  speed = 150;
  
  updateScore();
  spawnFood();
  render();
}

function startGame() {
  if (gameRunning) return;
  
  initGame();
  gameRunning = true;
  gamePaused = false;
  
  startBtn.textContent = '🔄 重新开始';
  pauseBtn.disabled = false;
  pauseBtn.textContent = '⏸️ 暂停';
  
  // 移除游戏结束界面
  const overlay = document.querySelector('.game-over-overlay');
  if (overlay) overlay.remove();
  
  gameLoop = setInterval(update, speed);
}

function pauseGame() {
  if (!gameRunning) return;
  
  gamePaused = !gamePaused;
  pauseBtn.textContent = gamePaused ? '▶️ 继续' : '⏸️ 暂停';
}

function stopGame() {
  gameRunning = false;
  gamePaused = false;
  
  if (gameLoop) {
    clearInterval(gameLoop);
    gameLoop = null;
  }
  
  startBtn.textContent = '▶️ 开始游戏';
  pauseBtn.disabled = true;
}

function gameOver() {
  stopGame();
  
  // 更新最高分
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
    highScoreEl.textContent = highScore;
  }
  
  // 显示游戏结束界面
  const overlay = document.createElement('div');
  overlay.className = 'game-over-overlay';
  overlay.innerHTML = `
    <div class="game-over-content">
      <h2>💀 游戏结束</h2>
      <div class="final-score">得分: ${score}</div>
      ${score === highScore ? '<div style="color: #f39c12; font-size: 1.2rem; margin: 10px 0;">🎉 新纪录！</div>' : ''}
      <div style="color: #aaa; margin: 10px 0;">蛇长度: ${snake.length}</div>
      <div class="game-over-buttons">
        <button onclick="startGame()">🔄 再来一次</button>
        <button onclick="window.location.href='index.html'">🏠 返回主页</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function update() {
  if (gamePaused) return;
  
  // 更新方向
  direction = { ...nextDirection };
  
  // 计算新头部位置
  const head = { ...snake[0] };
  head.x += direction.x;
  head.y += direction.y;
  
  // 检查碰撞
  if (checkCollision(head)) {
    gameOver();
    return;
  }
  
  // 移动蛇
  snake.unshift(head);
  
  // 检查是否吃到食物
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    spawnFood();
    
    // 加速
    if (speed > 50) {
      speed -= 2;
      clearInterval(gameLoop);
      gameLoop = setInterval(update, speed);
    }
  } else {
    snake.pop(); // 没吃到食物，移除尾部
  }
  
  render();
}

function checkCollision(head) {
  // 撞墙
  if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
    return true;
  }
  
  // 撞自己
  for (let i = 0; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) {
      return true;
    }
  }
  
  return false;
}

function spawnFood() {
  do {
    food = {
      x: Math.floor(Math.random() * GRID_COUNT),
      y: Math.floor(Math.random() * GRID_COUNT)
    };
  } while (snake.some(seg => seg.x === food.x && seg.y === food.y)); // 确保不生成在蛇身上
}

function updateScore() {
  scoreEl.textContent = score;
  lengthEl.textContent = snake.length;
}

function render() {
  // 清空画布
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 绘制网格（可选，淡淡的）
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < GRID_COUNT; i++) {
    ctx.beginPath();
    ctx.moveTo(i * GRID_SIZE, 0);
    ctx.lineTo(i * GRID_SIZE, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * GRID_SIZE);
    ctx.lineTo(canvas.width, i * GRID_SIZE);
    ctx.stroke();
  }
  
  // 绘制蛇
  snake.forEach((segment, index) => {
    const isHead = index === 0;
    
    // 蛇身渐变效果
    const gradient = ctx.createRadialGradient(
      segment.x * GRID_SIZE + GRID_SIZE / 2,
      segment.y * GRID_SIZE + GRID_SIZE / 2,
      0,
      segment.x * GRID_SIZE + GRID_SIZE / 2,
      segment.y * GRID_SIZE + GRID_SIZE / 2,
      GRID_SIZE / 2
    );
    
    if (isHead) {
      gradient.addColorStop(0, '#2ecc71');
      gradient.addColorStop(1, '#27ae60');
    } else {
      const alpha = 1 - (index / snake.length) * 0.5;
      gradient.addColorStop(0, `rgba(46, 204, 113, ${alpha})`);
      gradient.addColorStop(1, `rgba(39, 174, 96, ${alpha})`);
    }
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(
      segment.x * GRID_SIZE + GRID_SIZE / 2,
      segment.y * GRID_SIZE + GRID_SIZE / 2,
      GRID_SIZE / 2 - 2,
      0,
      Math.PI * 2
    );
    ctx.fill();
    
    // 蛇头眼睛
    if (isHead) {
      ctx.fillStyle = 'white';
      const eyeOffsetX = direction.x * 3;
      const eyeOffsetY = direction.y * 3;
      ctx.beginPath();
      ctx.arc(
        segment.x * GRID_SIZE + GRID_SIZE / 2 - 4 + eyeOffsetX,
        segment.y * GRID_SIZE + GRID_SIZE / 2 - 2 + eyeOffsetY,
        2,
        0,
        Math.PI * 2
      );
      ctx.fill();
      ctx.beginPath();
      ctx.arc(
        segment.x * GRID_SIZE + GRID_SIZE / 2 + 4 + eyeOffsetX,
        segment.y * GRID_SIZE + GRID_SIZE / 2 - 2 + eyeOffsetY,
        2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }
  });
  
  // 绘制食物
  const foodGradient = ctx.createRadialGradient(
    food.x * GRID_SIZE + GRID_SIZE / 2,
    food.y * GRID_SIZE + GRID_SIZE / 2,
    0,
    food.x * GRID_SIZE + GRID_SIZE / 2,
    food.y * GRID_SIZE + GRID_SIZE / 2,
    GRID_SIZE / 2
  );
  foodGradient.addColorStop(0, '#e74c3c');
  foodGradient.addColorStop(1, '#c0392b');
  
  ctx.fillStyle = foodGradient;
  ctx.beginPath();
  ctx.arc(
    food.x * GRID_SIZE + GRID_SIZE / 2,
    food.y * GRID_SIZE + GRID_SIZE / 2,
    GRID_SIZE / 2 - 3,
    0,
    Math.PI * 2
  );
  ctx.fill();
  
  // 食物高光
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(
    food.x * GRID_SIZE + GRID_SIZE / 2 - 3,
    food.y * GRID_SIZE + GRID_SIZE / 2 - 3,
    3,
    0,
    Math.PI * 2
  );
  ctx.fill();
}

// 键盘控制
document.addEventListener('keydown', (e) => {
  // 空格键暂停
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameRunning) pauseGame();
    else startGame();
    return;
  }
  
  if (!gameRunning || gamePaused) return;
  
  switch(e.key) {
    case 'ArrowUp':
    case 'w':
    case 'W':
      if (direction.y !== 1) {
        nextDirection = { x: 0, y: -1 };
      }
      break;
    case 'ArrowDown':
    case 's':
    case 'S':
      if (direction.y !== -1) {
        nextDirection = { x: 0, y: 1 };
      }
      break;
    case 'ArrowLeft':
    case 'a':
    case 'A':
      if (direction.x !== 1) {
        nextDirection = { x: -1, y: 0 };
      }
      break;
    case 'ArrowRight':
    case 'd':
    case 'D':
      if (direction.x !== -1) {
        nextDirection = { x: 1, y: 0 };
      }
      break;
  }
});

// 移动端控制
document.querySelector('#mobile-controls .up').onclick = () => {
  if (gameRunning && !gamePaused && direction.y !== 1) {
    nextDirection = { x: 0, y: -1 };
  }
};

document.querySelector('#mobile-controls .down').onclick = () => {
  if (gameRunning && !gamePaused && direction.y !== -1) {
    nextDirection = { x: 0, y: 1 };
  }
};

document.querySelector('#mobile-controls .left').onclick = () => {
  if (gameRunning && !gamePaused && direction.x !== 1) {
    nextDirection = { x: -1, y: 0 };
  }
};

document.querySelector('#mobile-controls .right').onclick = () => {
  if (gameRunning && !gamePaused && direction.x !== -1) {
    nextDirection = { x: 1, y: 0 };
  }
};

// 按钮控制
startBtn.onclick = startGame;
pauseBtn.onclick = pauseGame;

// 初始渲染
initGame();
</script>
</body>
</html>
